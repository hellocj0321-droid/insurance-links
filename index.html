<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험 약관 공시실 빠른 접근</title>
<style>
  :root{
    --navy:#0B2447; --blue:#1D4ED8; --bg:#F8FAFC; --line:#E2E8F0;
    --ink:#1E293B; --sub:#64748B; --life:#0F766E; --nonlife:#9A3412;
    --org:#6D28D9; --gold:#D97706; --warn:#B91C1C;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  a{color:var(--blue);text-decoration:none}
  header{background:var(--navy);color:#fff;padding:18px 24px}
  header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:-.3px}
  header .sub{margin-top:4px;font-size:12px;color:#A9C0E8}

  /* 상단 고정 표준약관·법규 패널 */
  .ref-panel{background:#fff;border-bottom:1px solid var(--line);
    padding:12px 24px;position:sticky;top:0;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .ref-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:4px 0}
  .ref-label{font-size:11px;font-weight:700;color:var(--navy);min-width:74px;
    background:#EEF2FF;border:1px solid #C7D2FE;border-radius:5px;
    padding:3px 8px;text-align:center}
  .ref-label.law{background:#FEF3C7;border-color:#FDE68A;color:#92400E}
  .pill{font-size:12px;background:#F1F5F9;border:1px solid var(--line);
    border-radius:14px;padding:4px 11px;white-space:nowrap;transition:.12s}
  .pill:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
  .pill .need{color:var(--warn);font-size:10px}
  .ref-toggle{cursor:pointer;font-size:12px;color:var(--sub);user-select:none;float:right}

  /* 컨트롤 */
  .controls{padding:14px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  #search{flex:1;min-width:220px;padding:9px 13px;border:1px solid var(--line);
    border-radius:8px;font-size:14px;outline:none}
  #search:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .fbtn{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:18px;
    cursor:pointer;font-size:13px;color:var(--sub);transition:.12s}
  .fbtn:hover{border-color:var(--blue);color:var(--blue)}
  .fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .count{font-size:12px;color:var(--sub);margin-left:auto;white-space:nowrap}

  /* 카드 그리드 */
  .grid{padding:6px 24px 60px;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:11px;
    padding:14px 15px;display:flex;flex-direction:column;gap:9px;
    transition:.12s;position:relative}
  .card:hover{box-shadow:0 4px 16px rgba(11,36,71,.09);border-color:#C7D2FE}
  .card.fav{border-color:var(--gold);background:#FFFEF8}
  .card-top{display:flex;align-items:flex-start;gap:8px}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;
    color:#fff;white-space:nowrap;margin-top:2px}
  .b-life{background:var(--life)} .b-nonlife{background:var(--nonlife)}
  .b-org{background:var(--org)}
  .cname{font-size:15px;font-weight:700;flex:1;letter-spacing:-.2px}
  .unv{font-size:9px;color:var(--warn);border:1px solid #FCA5A5;background:#FEF2F2;
    padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
  .star{cursor:pointer;font-size:18px;color:#CBD5E1;line-height:1;user-select:none}
  .star.on{color:var(--gold)}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .btn{font-size:12px;padding:6px 10px;border-radius:7px;cursor:pointer;
    border:1px solid var(--line);background:#fff;color:var(--ink);transition:.12s}
  .btn:hover{background:#F1F5F9}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
  .btn.primary:hover{background:#1742b8}
  .memo-toggle{font-size:11px;color:var(--sub);cursor:pointer;user-select:none}
  .memo-toggle:hover{color:var(--blue)}
  .memo{display:none}
  .memo.open{display:block}
  .memo textarea{width:100%;min-height:54px;border:1px solid var(--line);border-radius:7px;
    padding:7px 9px;font-size:12px;font-family:inherit;resize:vertical;color:var(--sub)}
  .memo textarea:focus{outline:none;border-color:var(--blue)}
  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:50px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
    opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  footer{padding:14px 24px 30px;font-size:11px;color:var(--sub);text-align:center}
</style>

/* ===== 상태 ===== */
const LS_FAV="ins_fav_v1", LS_MEMO="ins_memo_v1";
let favs = JSON.parse(localStorage.getItem(LS_FAV)||"[]");
let memos = JSON.parse(localStorage.getItem(LS_MEMO)||"{}");
let filter="all", q="";

const FILTERS=[["all","전체"],["fav","⭐ 즐겨찾기"],["life","생명보험"],["nonlife","손해보험"],["org","기관"]];
const BADGE={life:["b-life","생보"],nonlife:["b-nonlife","손보"],org:["b-org","기관"]};

/* ===== 렌더: 표준약관·법규 패널 ===== */
function renderPills(arr,row){
  arr.forEach(x=>{
    const a=document.createElement("a");
    a.className="pill"; a.href=x.url; a.target="_blank"; a.rel="noopener";
    a.innerHTML = x.name + (x.need?' <span class="need">검색필요</span>':'');
    row.appendChild(a);
  });
}
renderPills(LAW, document.getElementById("lawRow"));

document.getElementById("refToggle").onclick=function(){
  const b=document.getElementById("refBody");
  const hidden=b.style.display==="none";
  b.style.display=hidden?"":"none";
  this.textContent=hidden?"패널 접기 ▲":"표준약관·법규 패널 펼치기 ▼";
};

/* ===== 렌더: 필터 버튼 ===== */
const fc=document.getElementById("filters");
FILTERS.forEach(([k,label])=>{
  const b=document.createElement("button");
  b.className="fbtn"+(k==="all"?" on":""); b.textContent=label; b.dataset.k=k;
  b.onclick=()=>{filter=k; [...fc.children].forEach(c=>c.classList.toggle("on",c.dataset.k===k)); render();};
  fc.appendChild(b);
});

/* ===== 렌더: 카드 그리드 ===== */
const grid=document.getElementById("grid"), countEl=document.getElementById("count");
function render(){
  let list=DATA.filter(d=>{
    if(filter==="fav") { if(!favs.includes(d.n)) return false; }
    else if(filter!=="all" && d.c!==filter) return false;
    if(q && !(d.n.toLowerCase().includes(q) || (d.m||"").toLowerCase().includes(q))) return false;
    return true;
  });
  // 즐겨찾기 우선 정렬
  list.sort((a,b)=>(favs.includes(b.n)?1:0)-(favs.includes(a.n)?1:0));
  grid.innerHTML="";
  if(!list.length){grid.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';countEl.textContent="0건";return;}
  countEl.textContent=list.length+"건";
  list.forEach(d=>grid.appendChild(card(d)));
}

function card(d){
  const isFav=favs.includes(d.n);
  const isOrg=d.c==="org";              // 유관기관: 공시실 별도 없음 → 홈·복사만
  const [bcls,btxt]=BADGE[d.c];
  const copyUrl=isOrg?d.h:d.g;
  const memoVal = memos[d.n]!==undefined ? memos[d.n] : (d.p + (d.m?(" | "+d.m):""));
  const el=document.createElement("div");
  el.className="card"+(isFav?" fav":"");
  el.innerHTML=`
    <div class="card-top">
      <span class="badge ${bcls}">${btxt}</span>
      <span class="cname">${d.n}${d.u?'<span class="unv">미검증</span>':''}</span>
      <span class="star ${isFav?'on':''}" title="즐겨찾기">${isFav?'★':'☆'}</span>
    </div>
    <div class="actions">
      ${isOrg?'':`<a class="btn primary" href="${d.g}" target="_blank" rel="noopener">📂 공시실 열기</a>`}
      <a class="btn ${isOrg?'primary':''}" href="${d.h}" target="_blank" rel="noopener">🏠 홈</a>
      <button class="btn copy">📋 복사</button>
      <span class="memo-toggle">📝 경로·메모</span>
    </div>
    <div class="memo">
      <textarea spellcheck="false">${memoVal.replace(/</g,"&lt;")}</textarea>
    </div>`;
  el.querySelector(".star").onclick=()=>{
    if(isFav) favs=favs.filter(x=>x!==d.n); else favs.push(d.n);
    localStorage.setItem(LS_FAV,JSON.stringify(favs)); render();
  };
  el.querySelector(".copy").onclick=()=>{
    navigator.clipboard.writeText(copyUrl).then(()=>toast((isOrg?"홈 URL 복사됨: ":"공시실 URL 복사됨: ")+d.n));
  };
  const mt=el.querySelector(".memo-toggle"), mb=el.querySelector(".memo");
  mt.onclick=()=>mb.classList.toggle("open");
  const ta=el.querySelector("textarea");
  ta.onclick=e=>e.stopPropagation();
  ta.oninput=()=>{ memos[d.n]=ta.value; localStorage.setItem(LS_MEMO,JSON.stringify(memos)); };
  return el;
}

/* ===== 검색 ===== */
document.getElementById("search").oninput=e=>{q=e.target.value.trim().toLowerCase();render();};

/* ===== 토스트 ===== */
let tT;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove("show"),1600);
}

render();
</script>
